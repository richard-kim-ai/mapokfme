<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마포구 소상공인연합회 - 관리자 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0B6E6E;
  --primary-dark: #084F4F;
  --bg: #F0F4F4;
  --text: #1A2B2B;
  --border: #D8EAEA;
  --white: #fff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

/* ───────── LOGIN ───────── */
#loginOverlay { position: fixed; inset: 0; background: var(--primary-dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
.login-box { background: #fff; padding: 40px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; }
.login-box h2 { color: var(--primary); margin-bottom: 24px; font-weight: 900; }
.login-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1.5px solid var(--border); border-radius: 8px; outline: none; }
.btn-login { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

/* ───────── SIDEBAR ───────── */
aside { width: 240px; background: #1A1A2E; color: rgba(255,255,255,0.7); display: flex; flex-direction: column; transition: 0.3s; }
.sidebar-head { padding: 20px 15px; color: #fff; font-weight: 900; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); }
nav { flex: 1; padding: 20px 0; }
.nav-item { padding: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; font-size: 14px; }
.nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: #fff; border-left: 4px solid var(--primary); }

/* ───────── MAIN CONTENT ───────── */
main { flex: 1; padding: 16px; }
.page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
.page-title { font-size: 20px; font-weight: 700; color: var(--primary-dark); }

/* ───────── RESPONSIVE STYLES ───────── */
@media screen and (max-width: 768px) {
  aside { width: 100%; height: auto; flex-direction: row; overflow-x: auto; }
  .sidebar-head { text-align: center; }
  .nav-item { flex: 1; justify-content: center; font-size: 12px; }
  .page-head { flex-direction: column; align-items: flex-start; }
}

@media screen and (max-width: 480px) {
  .login-box { padding: 20px; }
  .nav-item { font-size: 10px; padding: 8px; }
  .page-title { font-size: 18px; }
}
</style>
</head>
<body>
<div id="loginOverlay">
  <div class="login-box">
    <h2>ADMIN LOGIN</h2>
    <input type="text" class="login-input" placeholder="관리자 아이디">
    <input type="password" class="login-input" placeholder="비밀번호">
    <button class="btn-login">로그인</button>
  </div>
</div>

<aside>
  <div class="sidebar-head">관리자 메뉴</div>
  <nav>
    <div class="nav-item active">대시보드</div>
    <div class="nav-item">회원 관리</div>
    <div class="nav-item">설정</div>
  </nav>
</aside>

<main>
  <div class="page-head">
    <div class="page-title">대시보드</div>
  </div>
  <p>여기에 콘텐츠가 표시됩니다.</p>
</main>
</body>
</html>
